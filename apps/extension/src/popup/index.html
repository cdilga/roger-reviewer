<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roger Reviewer</title>
    <link rel="stylesheet" href="../../static/roger-identity.css" />
    <style>
      :root {
        color-scheme: light;
        --rr-popup-canvas: linear-gradient(160deg, #eef2f6 0%, #f6f8fa 48%, #e6edf3 100%);
        --rr-popup-ink: #0d1117;
        --rr-popup-muted: #57606a;
        --rr-popup-accent: #2f81f7;
        --rr-popup-accent-strong: #1f6feb;
        --rr-popup-border: #d0d7de;
        --rr-popup-shadow: 0 10px 20px rgba(13, 17, 23, 0.08);
        font-family: "Segoe UI Variable", "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        width: 352px;
        background: var(--rr-popup-canvas);
        color: var(--rr-popup-ink);
      }

      main {
        padding: 12px;
      }

      .brand-shell {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        flex: 0 0 auto;
      }

      .brand-wordmark {
        display: block;
        width: 152px;
        max-width: 100%;
        height: auto;
      }

      .brand-tagline {
        margin: 4px 0 0;
        font-size: 11px;
        line-height: 1.35;
        color: var(--rr-popup-muted);
      }

      .card {
        background: #ffffff;
        border: 1px solid var(--rr-popup-border);
        border-radius: 12px;
        padding: 12px;
        box-shadow: var(--rr-popup-shadow);
      }

      h1 {
        margin: 0;
        font-size: 13px;
        line-height: 1.3;
        letter-spacing: 0.01em;
      }

      p {
        margin: 8px 0 0;
        font-size: 12px;
        line-height: 1.4;
        color: var(--rr-popup-muted);
      }

      .actions {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .actions-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        border: 1px solid var(--rr-popup-border);
        border-radius: 6px;
        background: #f4f7f9;
        color: var(--rr-popup-ink);
        font-size: 12px;
        padding: 7px 8px;
        cursor: pointer;
        transition: border-color 0.12s ease, background-color 0.12s ease, color 0.12s ease;
      }

      button:hover:enabled {
        background: #edf5f8;
        border-color: var(--rr-popup-accent);
        color: var(--rr-popup-accent-strong);
      }

      button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      .status-error {
        color: #cf222e;
      }

      .action-primary {
        background: var(--rr-popup-accent);
        border-color: var(--rr-popup-accent-strong);
        color: #ffffff;
        font-weight: 600;
      }

      .action-primary:hover:enabled {
        background: var(--rr-popup-accent-strong);
        border-color: var(--rr-popup-accent-strong);
        color: #ffffff;
      }

      .action-secondary {
        background: #ffffff;
      }

      .action-tertiary {
        color: var(--rr-popup-muted);
      }

      .popup-info {
        margin: 10px 0 0;
        padding-top: 8px;
        border-top: 1px solid var(--rr-popup-border);
      }

      .popup-info summary {
        cursor: pointer;
        font-size: 11px;
        line-height: 1.3;
        font-weight: 600;
        color: var(--rr-popup-muted);
      }

      .popup-info p {
        margin: 6px 0 0;
        font-size: 11px;
        line-height: 1.35;
        color: var(--rr-popup-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <header class="brand-shell">
        <img class="brand-mark" src="../../static/roger-mark.svg" alt="Roger Reviewer mark" />
        <div>
          <img class="brand-wordmark" src="../../static/roger-wordmark.svg" alt="Roger Reviewer" />
          <p class="brand-tagline">Local-first review continuity, always on your PR page.</p>
        </div>
      </header>
      <section class="card" aria-live="polite">
        <h1 id="popup-title">Manual Backup Controls</h1>
        <p id="popup-subtitle">Checking active tab context…</p>
        <div class="actions">
          <button type="button" class="action-primary" data-action="start_review" disabled>
            Start Review in Roger
          </button>
          <div class="actions-row">
            <button type="button" class="action-secondary" data-action="resume_review" disabled>
              Resume Existing Review
            </button>
            <button type="button" class="action-tertiary" data-action="show_findings" disabled>
              View Findings
            </button>
          </div>
        </div>
        <details class="popup-info" id="popup-info">
          <summary id="popup-info-toggle">Build and fallback details</summary>
          <p id="popup-build-info">Extension build unavailable.</p>
          <p>Use this popup only as a manual backup when in-page Roger controls are unavailable.</p>
        </details>
      </section>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
