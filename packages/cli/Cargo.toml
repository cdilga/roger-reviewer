[package]
name = "roger-cli"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "rr"
path = "src/main.rs"

[dependencies]
roger-app-core = { path = "../app-core" }
roger-bridge = { path = "../bridge" }
roger-config = { path = "../config" }
roger-session-claude = { path = "../session-claude" }
roger-session-codex = { path = "../session-codex" }
roger-session-gemini = { path = "../session-gemini" }
roger-session-opencode = { path = "../session-opencode" }
roger-storage = { path = "../storage" }
rusqlite.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
toon-format = { version = "0.4.5", default-features = false }

[dev-dependencies]
tempfile.workspace = true
roger-validation = { path = "../validation" }
