[package]
name = "roger-storage"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
doctest = false

[features]
default = []
semantic-fastembed = []

[dependencies]
roger-app-core = { path = "../app-core" }
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"

[dev-dependencies]
tempfile = "3.10"
