name: validation-gated

on:
  push:
    branches:
      - main

jobs:
  gated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: tier
        uses: ./.github/actions/validation-tier
        with:
          tier: gated

      - name: Upload failure artifacts
        if: ${{ always() && failure() && steps.tier.outputs.upload_mode == 'failure' && steps.tier.outputs.bootstrap_skip != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-gated-failures
          path: ${{ steps.tier.outputs.artifact_root }}
          if-no-files-found: ignore
          retention-days: ${{ steps.tier.outputs.retention_days }}
