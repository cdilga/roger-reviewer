name: release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref for CalVer derivation (defaults to GITHUB_REF)"
        required: false
        type: string
      sha:
        description: "Commit SHA for derivation (defaults to GITHUB_SHA)"
        required: false
        type: string
      today:
        description: "UTC date basis for nightly derivation (YYYY.MM.DD)"
        required: false
        type: string
      publish_mode:
        description: "Explicit release behavior"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - publish
      operator_smoke_ack:
        description: "Set true after manual release-smoke completion (required for publish mode)"
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - .github/workflows/release.yml
      - scripts/release/**
      - docs/RELEASE_AND_TEST_MATRIX.md
      - docs/RELEASE_CALVER_VERSIONING_CONTRACT.md
      - docs/release-publish-operator-smoke.md
      - docs/EXTENSION_PACKAGING_AND_RELEASE_CONTRACT.md
      - packages/cli/src/lib.rs
      - packages/bridge/src/lib.rs
      - apps/extension/src/generated/bridge.ts
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  fixture-rehearsal:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rehearse release fixture/test workflows
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/release/test_release_migration_gate_workflow.sh
          bash scripts/release/test_release_build_core_workflow.sh
          bash scripts/release/test_release_publish_workflow.sh
          bash scripts/release/test_publish_release.sh
          bash scripts/release/test_verify_release_assets.sh
          bash scripts/release/test_build_release_notes.sh
          bash scripts/release/test_build_install_metadata_bundle.sh
          bash scripts/release/test_derive_calver_version.sh

  migration-rehearsal:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Rehearse prior-schema store migration before release generation
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p roger-storage --test release_migration_gate

  derive-release-metadata:
    if: github.event_name != 'pull_request'
    needs: migration-rehearsal
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.derive.outputs.channel }}
      version: ${{ steps.derive.outputs.version }}
      tag: ${{ steps.derive.outputs.tag }}
      prerelease: ${{ steps.derive.outputs.prerelease }}
      artifact_stem: ${{ steps.derive.outputs.artifact_stem }}
      release_name: ${{ steps.derive.outputs.release_name }}
      workspace_version: ${{ steps.derive.outputs.workspace_version }}
    steps:
      - uses: actions/checkout@v4

      - id: derive
        env:
          INPUT_REF: ${{ github.event.inputs.ref || '' }}
          INPUT_SHA: ${{ github.event.inputs.sha || '' }}
          INPUT_TODAY: ${{ github.event.inputs.today || '' }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${GITHUB_REF}}"
          sha="${INPUT_SHA:-${GITHUB_SHA}}"
          today="${INPUT_TODAY:-$(date -u +%Y.%m.%d)}"

          python3 scripts/release/derive_calver_version.py \
            --ref "${ref}" \
            --sha "${sha}" \
            --today "${today}" > release-metadata.json

          echo "channel=$(jq -r '.channel' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "version=$(jq -r '.version' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "tag=$(jq -r '.tag' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "prerelease=$(jq -r '.prerelease' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "artifact_stem=$(jq -r '.artifact_stem' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "release_name=$(jq -r '.release_name' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "workspace_version=$(jq -r '.workspace_version' release-metadata.json)" >>"${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata.json
          if-no-files-found: error
          retention-days: 14

  build-core:
    if: github.event_name != 'pull_request'
    needs: derive-release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: rr
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: rr
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: rr
          - os: macos-14
            target: x86_64-apple-darwin
            binary_name: rr
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            binary_name: rr.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build rr for target
        shell: bash
        env:
          ROGER_RELEASE_VERSION: ${{ needs.derive-release-metadata.outputs.version }}
          ROGER_RELEASE_CHANNEL: ${{ needs.derive-release-metadata.outputs.channel }}
          ROGER_RELEASE_TAG: ${{ needs.derive-release-metadata.outputs.tag }}
        run: |
          set -euo pipefail
          cargo build -p roger-cli --bin rr --release --target "${{ matrix.target }}"

      - name: Package target archive + per-target manifest
        shell: bash
        env:
          ARTIFACT_STEM: ${{ needs.derive-release-metadata.outputs.artifact_stem }}
          RELEASE_CHANNEL: ${{ needs.derive-release-metadata.outputs.channel }}
          RELEASE_VERSION: ${{ needs.derive-release-metadata.outputs.version }}
          RELEASE_TAG: ${{ needs.derive-release-metadata.outputs.tag }}
          RELEASE_PRERELEASE: ${{ needs.derive-release-metadata.outputs.prerelease }}
          RELEASE_NAME: ${{ needs.derive-release-metadata.outputs.release_name }}
          WORKSPACE_VERSION: ${{ needs.derive-release-metadata.outputs.workspace_version }}
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          binary_name="${{ matrix.binary_name }}"

          archive_name="${ARTIFACT_STEM}-core-${target}.tar.gz"
          payload_dir="${ARTIFACT_STEM}-core-${target}"
          mkdir -p "dist/${payload_dir}"

          cp "target/${target}/release/${binary_name}" "dist/${payload_dir}/${binary_name}"

          cat >"dist/${payload_dir}/runtime-metadata.json" <<EOF
          {
            "schema": "roger.release-core-runtime.v1",
            "channel": "${RELEASE_CHANNEL}",
            "version": "${RELEASE_VERSION}",
            "tag": "${RELEASE_TAG}",
            "release_name": "${RELEASE_NAME}",
            "prerelease": ${RELEASE_PRERELEASE},
            "workspace_version": "${WORKSPACE_VERSION}",
            "target": "${target}",
            "binary_name": "${binary_name}",
            "source_ref": "${GITHUB_REF}",
            "source_sha": "${GITHUB_SHA}"
          }
          EOF

          tar -czf "dist/${archive_name}" -C dist "${payload_dir}"
          archive_sha256="$(python3 -c "import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('dist/${archive_name}').read_bytes()).hexdigest())")"

          cat >"dist/core-manifest-${target}.json" <<EOF
          {
            "schema": "roger.release-build-core.target.v1",
            "target": "${target}",
            "runner_os": "${{ runner.os }}",
            "archive_name": "${archive_name}",
            "archive_path": "dist/${archive_name}",
            "archive_sha256": "${archive_sha256}",
            "payload_dir": "${payload_dir}",
            "binary_name": "${binary_name}"
          }
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.target }}
          path: |
            dist/${{ needs.derive-release-metadata.outputs.artifact_stem }}-core-${{ matrix.target }}.tar.gz
            dist/core-manifest-${{ matrix.target }}.json
          if-no-files-found: error
          retention-days: 14

  aggregate-core-manifest:
    if: github.event_name != 'pull_request'
    needs:
      - derive-release-metadata
      - build-core
    runs-on: ubuntu-latest
    outputs:
      manifest_name: ${{ steps.aggregate.outputs.manifest_name }}
      manifest_path: ${{ steps.aggregate.outputs.manifest_path }}
      install_metadata_name: ${{ steps.aggregate.outputs.install_metadata_name }}
      install_metadata_path: ${{ steps.aggregate.outputs.install_metadata_path }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata

      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: core-builds
          merge-multiple: true

      - id: aggregate
        run: |
          set -euo pipefail
          matrix_scope="first_shipped_subset"
          excluded_target="aarch64-pc-windows-msvc"
          manifest_name="release-core-manifest-${{ needs.derive-release-metadata.outputs.version }}.json"
          manifest_path="core-builds/${manifest_name}"
          install_metadata_name="release-install-metadata-${{ needs.derive-release-metadata.outputs.version }}.json"
          install_metadata_path="core-builds/${install_metadata_name}"

          python3 scripts/release/build_core_manifest.py \
            --version-metadata release-metadata/release-metadata.json \
            --core-manifests-dir core-builds \
            --matrix-scope "${matrix_scope}" \
            --excluded-target "${excluded_target}" \
            --output "${manifest_path}"

          python3 scripts/release/build_install_metadata_bundle.py \
            --version-metadata release-metadata/release-metadata.json \
            --core-manifest "${manifest_path}" \
            --output "${install_metadata_path}"

          cp scripts/release/rr-install.sh core-builds/rr-install.sh
          cp scripts/release/rr-install.ps1 core-builds/rr-install.ps1

          echo "manifest_name=${manifest_name}" >>"${GITHUB_OUTPUT}"
          echo "manifest_path=${manifest_path}" >>"${GITHUB_OUTPUT}"
          echo "install_metadata_name=${install_metadata_name}" >>"${GITHUB_OUTPUT}"
          echo "install_metadata_path=${install_metadata_path}" >>"${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-build-core-manifest
          path: ${{ steps.aggregate.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: core-install-metadata
          path: |
            ${{ steps.aggregate.outputs.install_metadata_path }}
            core-builds/rr-install.sh
            core-builds/rr-install.ps1
          if-no-files-found: error
          retention-days: 14

  package-bridge:
    if: github.event_name != 'pull_request'
    needs: derive-release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            bundle_os: linux
          - runner: macos-14
            bundle_os: macos
          - runner: windows-2022
            bundle_os: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata

      - name: Build bridge registration bundle for ${{ matrix.bundle_os }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/release/package_bridge_bundle.sh \
            --version-metadata release-metadata/release-metadata.json \
            --os "${{ matrix.bundle_os }}" \
            --output-dir dist/bridge

      - uses: actions/upload-artifact@v4
        with:
          name: bridge-bundle-${{ matrix.bundle_os }}
          path: |
            dist/bridge/*-bridge-${{ matrix.bundle_os }}.tar.gz
            dist/bridge/*-bridge-${{ matrix.bundle_os }}/bridge-bundle-manifest.json
            dist/bridge/*-bridge-${{ matrix.bundle_os }}/asset-manifest.json
            dist/bridge/*-bridge-${{ matrix.bundle_os }}/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  verify-bridge-contract:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Verify bridge contract drift gate
        run: cargo run -q -p roger-cli --bin rr -- bridge verify-contracts --robot > bridge-verify.json

      - uses: actions/upload-artifact@v4
        with:
          name: bridge-contract-verify
          path: bridge-verify.json
          if-no-files-found: error
          retention-days: 14

  package-extension:
    if: github.event_name != 'pull_request'
    needs:
      - derive-release-metadata
      - verify-bridge-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata

      - name: Package extension lane output after contract verification
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/release/package_extension_bundle.sh \
            --version-metadata release-metadata/release-metadata.json \
            --output-dir dist/extension

      - uses: actions/upload-artifact@v4
        with:
          name: extension-bundle
          path: |
            dist/extension/*-extension.zip
            dist/extension/extension-bundle-manifest.json
            dist/extension/bridge-verify.json
            dist/extension/pack-extension.json
          if-no-files-found: error
          retention-days: 14

  summarize-optional-lanes:
    if: github.event_name != 'pull_request'
    needs:
      - derive-release-metadata
      - package-bridge
      - package-extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata

      - uses: actions/download-artifact@v4
        with:
          pattern: bridge-bundle-*
          path: optional-lanes/bridge
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: extension-bundle
          path: optional-lanes/extension

      - name: Build optional-lane summary
        shell: bash
        run: |
          set -euo pipefail
          args=()

          while IFS= read -r archive; do
            args+=(--bridge-artifact "$(basename "$archive")")
          done < <(find optional-lanes/bridge -type f -name '*.tar.gz' | sort)

          while IFS= read -r archive; do
            args+=(--extension-artifact "$(basename "$archive")")
          done < <(find optional-lanes/extension -type f -name '*.zip' | sort)

          python3 scripts/release/build_optional_lane_summary.py \
            --version-metadata release-metadata/release-metadata.json \
            --bridge-status built \
            --extension-status built \
            "${args[@]}" \
            --output optional-lanes/release-optional-lanes.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-optional-lanes
          path: optional-lanes/release-optional-lanes.json
          if-no-files-found: error
          retention-days: 14

  verify-release-assets:
    if: github.event_name != 'pull_request'
    needs:
      - derive-release-metadata
      - aggregate-core-manifest
      - summarize-optional-lanes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: upstream/version-metadata

      - uses: actions/download-artifact@v4
        with:
          name: release-build-core-manifest
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          name: core-install-metadata
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: upstream/assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: bridge-bundle-*
          path: upstream/assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: extension-bundle
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          name: release-optional-lanes
          path: upstream/optional-summaries

      - name: Verify release assets from in-workflow artifacts
        shell: bash
        run: |
          set -euo pipefail
          version_metadata="$(find upstream/version-metadata -type f -name 'release-metadata.json' | head -n1)"
          core_manifest="$(find upstream/assets -type f -name 'release-core-manifest-*.json' | head -n1)"
          optional_summary="$(find upstream/optional-summaries -type f -name 'release-optional-lanes.json' | head -n1)"
          installer_sh="$(find upstream/assets -type f -name 'rr-install.sh' | head -n1)"
          installer_ps1="$(find upstream/assets -type f -name 'rr-install.ps1' | head -n1)"

          if [[ -z "${installer_sh}" || -z "${installer_ps1}" ]]; then
            echo "missing installer artifacts under upstream/assets"
            find upstream/assets -maxdepth 4 -type f | sort
            exit 1
          fi

          cp "${installer_sh}" upstream/assets/rr-install.sh
          cp "${installer_ps1}" upstream/assets/rr-install.ps1

          python3 scripts/release/verify_release_assets.py \
            --version-metadata "${version_metadata}" \
            --core-manifest "${core_manifest}" \
            --asset-root upstream/assets \
            --optional-summary "${optional_summary}" \
            --output-dir upstream/reverified

      - uses: actions/upload-artifact@v4
        with:
          name: release-verify-assets-report
          path: |
            upstream/reverified/release-asset-manifest.json
            upstream/reverified/SHA256SUMS
            upstream/reverified/release-notes-signing.md
          if-no-files-found: error
          retention-days: 14

  windows-install-update-rehearsal:
    if: github.event_name != 'pull_request'
    needs:
      - derive-release-metadata
      - aggregate-core-manifest
      - verify-release-assets
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: upstream/version-metadata

      - uses: actions/download-artifact@v4
        with:
          name: core-install-metadata
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          name: release-build-core-manifest
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: upstream/assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: release-verify-assets-report
          path: upstream/verify-report

      - name: Rehearse PowerShell install + installed-binary dry-run update
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          function Fail {
              param([string]$Message)
              throw $Message
          }

          function Find-SingleFile {
              param(
                  [string]$Root,
                  [string]$Name
              )

              $matches = @(
                  Get-ChildItem -Path $Root -Recurse -File -ErrorAction Stop |
                      Where-Object { $_.Name -eq $Name }
              )
              if ($matches.Count -eq 0) {
                  Fail "missing expected artifact '$Name' under $Root"
              }
              if ($matches.Count -gt 1) {
                  Fail "ambiguous artifact '$Name' under $Root"
              }
              return $matches[0].FullName
          }

          function To-FileUri {
              param([string]$Path)
              $resolved = Resolve-Path -LiteralPath $Path -ErrorAction Stop
              return ([System.Uri]$resolved.Path).AbsoluteUri.TrimEnd('/')
          }

          $workspaceRoot = $env:GITHUB_WORKSPACE
          $artifactRoot = Join-Path $workspaceRoot "upstream/windows-rehearsal"
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          $summaryPath = Join-Path $artifactRoot "windows-install-update-rehearsal-summary.json"
          $robotOutputPath = Join-Path $artifactRoot "windows-update-dry-run.json"
          $robotStderrPath = Join-Path $artifactRoot "windows-update-dry-run.stderr.txt"

          $status = "pass"
          $blockedReason = $null
          $reasonCode = $null
          $updateOutcome = $null
          $version = $null
          $tag = $null
          $target = $null
          $downloadRootUri = $null
          $apiRootUri = $null
          $runUrl = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)"

          try {
              $releaseMetadataPath = Find-SingleFile -Root (Join-Path $workspaceRoot "upstream/version-metadata") -Name "release-metadata.json"
              $releaseMetadata = Get-Content -Raw -Path $releaseMetadataPath | ConvertFrom-Json
              $version = [string]$releaseMetadata.version
              $tag = [string]$releaseMetadata.tag
              if ([string]::IsNullOrWhiteSpace($version) -or [string]::IsNullOrWhiteSpace($tag)) {
                  Fail "release metadata must include non-empty version and tag"
              }

              if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") {
                  $target = "aarch64-pc-windows-msvc"
              } else {
                  $target = "x86_64-pc-windows-msvc"
              }

              $assetRoot = Join-Path $workspaceRoot "upstream/assets"
              $installMetadataName = "release-install-metadata-$version.json"
              $installMetadataPath = Find-SingleFile -Root $assetRoot -Name $installMetadataName
              $installMetadata = Get-Content -Raw -Path $installMetadataPath | ConvertFrom-Json

              $matchingTargets = @($installMetadata.targets | Where-Object { $_.target -eq $target })
              if ($matchingTargets.Count -eq 0) {
                  Fail "install metadata has no entry for target $target"
              }
              if ($matchingTargets.Count -gt 1) {
                  Fail "install metadata has ambiguous entries for target $target"
              }
              $targetEntry = $matchingTargets[0]
              $archiveName = [string]$targetEntry.archive_name
              if ([string]::IsNullOrWhiteSpace($archiveName)) {
                  Fail "install metadata target entry missing archive_name for $target"
              }

              $coreManifestName = [string]$installMetadata.core_manifest_name
              if ([string]::IsNullOrWhiteSpace($coreManifestName)) {
                  Fail "install metadata missing core_manifest_name"
              }

              $rehearsalRoot = Join-Path $env:RUNNER_TEMP "windows-install-update-rehearsal"
              if (Test-Path $rehearsalRoot) {
                  Remove-Item -Path $rehearsalRoot -Recurse -Force
              }
              New-Item -ItemType Directory -Path $rehearsalRoot -Force | Out-Null

              $downloadRootFs = Join-Path $rehearsalRoot "releases/download"
              $tagRoot = Join-Path $downloadRootFs $tag
              New-Item -ItemType Directory -Path $tagRoot -Force | Out-Null

              Copy-Item -Path (Find-SingleFile -Root $assetRoot -Name $installMetadataName) -Destination (Join-Path $tagRoot $installMetadataName) -Force
              Copy-Item -Path (Find-SingleFile -Root $assetRoot -Name $coreManifestName) -Destination (Join-Path $tagRoot $coreManifestName) -Force
              Copy-Item -Path (Find-SingleFile -Root $assetRoot -Name $archiveName) -Destination (Join-Path $tagRoot $archiveName) -Force
              Copy-Item -Path (Find-SingleFile -Root (Join-Path $workspaceRoot "upstream/verify-report") -Name "SHA256SUMS") -Destination (Join-Path $tagRoot "SHA256SUMS") -Force

              $publishedInstallerPath = Join-Path $tagRoot "rr-install.ps1"
              Copy-Item -Path (Find-SingleFile -Root $assetRoot -Name "rr-install.ps1") -Destination $publishedInstallerPath -Force

              $apiRootFs = Join-Path $rehearsalRoot "api/repos/cdilga/roger-reviewer"
              $apiReleasesDir = Join-Path $apiRootFs "releases"
              New-Item -ItemType Directory -Path $apiReleasesDir -Force | Out-Null
              @"
          {
            "tag_name": "$tag"
          }
          "@ | Set-Content -Path (Join-Path $apiReleasesDir "latest") -Encoding utf8NoBOM

              $downloadRootUri = To-FileUri -Path $downloadRootFs
              $apiRootUri = To-FileUri -Path $apiRootFs

              $installDir = Join-Path $rehearsalRoot "install/bin"
              New-Item -ItemType Directory -Path $installDir -Force | Out-Null
              & pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File $publishedInstallerPath `
                  -Version $version `
                  -DownloadRoot $downloadRootUri `
                  -InstallDir $installDir `
                  -Target $target

              $rrPath = Join-Path $installDir "rr.exe"
              if (-not (Test-Path -LiteralPath $rrPath -PathType Leaf)) {
                  Fail "installer did not produce rr.exe at $rrPath"
              }

              $env:RR_STORE_ROOT = Join-Path $rehearsalRoot "store"
              & $rrPath update `
                  --api-root $apiRootUri `
                  --download-root $downloadRootUri `
                  --dry-run `
                  --robot 1> $robotOutputPath 2> $robotStderrPath
              $updateExit = $LASTEXITCODE
              Remove-Item Env:RR_STORE_ROOT -ErrorAction SilentlyContinue

              $robotRaw = ""
              if (Test-Path -LiteralPath $robotOutputPath) {
                  $robotRaw = Get-Content -Raw -Path $robotOutputPath
              }
              if ([string]::IsNullOrWhiteSpace($robotRaw)) {
                  Fail "rr update --dry-run --robot produced no JSON output"
              }
              $robotPayload = $robotRaw | ConvertFrom-Json

              $updateOutcome = [string]$robotPayload.outcome
              if ($robotPayload.PSObject.Properties.Name -contains "data") {
                  $data = $robotPayload.data
                  if ($null -ne $data -and $data.PSObject.Properties.Name -contains "reason_code") {
                      $reasonCode = [string]$data.reason_code
                  }
              }

              if ($updateExit -ne 0) {
                  Fail "rr update --dry-run --robot exited non-zero ($updateExit)"
              }
              if ($updateOutcome -eq "blocked" -or $updateOutcome -eq "error") {
                  Fail "rr update dry-run outcome was $updateOutcome"
              }
              if ($reasonCode -in @("checksums_missing", "checksums_mismatch", "checksums_entry_invalid")) {
                  Fail "rr update dry-run returned checksum/asset mismatch reason_code=$reasonCode"
              }
              if ($updateOutcome -notin @("complete", "empty")) {
                  Fail "unexpected rr update dry-run outcome '$updateOutcome'"
              }
          }
          catch {
              $status = "blocked"
              $blockedReason = $_.Exception.Message
          }

          $summary = [ordered]@{
              schema = "roger.release.windows-install-update-rehearsal.v1"
              status = $status
              run_id = $env:GITHUB_RUN_ID
              run_url = $runUrl
              release_version = $version
              release_tag = $tag
              target = $target
              download_root = $downloadRootUri
              api_root = $apiRootUri
              update_outcome = $updateOutcome
              reason_code = $reasonCode
              blocked_reason = $blockedReason
              artifacts = @{
                  robot_output = "windows-update-dry-run.json"
                  robot_stderr = "windows-update-dry-run.stderr.txt"
              }
          }
          $summary | ConvertTo-Json -Depth 6 | Set-Content -Path $summaryPath -Encoding utf8NoBOM

          if ($status -ne "pass") {
              Fail "Windows PowerShell install/update rehearsal blocked: $blockedReason"
          }

      - name: Upload Windows install/update rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-install-update-rehearsal
          path: |
            upstream/windows-rehearsal/windows-install-update-rehearsal-summary.json
            upstream/windows-rehearsal/windows-update-dry-run.json
            upstream/windows-rehearsal/windows-update-dry-run.stderr.txt
          if-no-files-found: error
          retention-days: 14

  wsl-install-update-rehearsal:
    if: github.event_name != 'pull_request'
    needs:
      - derive-release-metadata
      - aggregate-core-manifest
      - verify-release-assets
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: upstream/version-metadata

      - uses: actions/download-artifact@v4
        with:
          name: core-install-metadata
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          name: release-build-core-manifest
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: upstream/assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: release-verify-assets-report
          path: upstream/verify-report

      - name: Rehearse WSL install + installed-binary dry-run update
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          function Fail {
              param([string]$Message)
              throw $Message
          }

          function Find-SingleFile {
              param(
                  [string]$Root,
                  [string]$Name
              )

              $matches = @(
                  Get-ChildItem -Path $Root -Recurse -File -ErrorAction Stop |
                      Where-Object { $_.Name -eq $Name }
              )
              if ($matches.Count -eq 0) {
                  Fail "missing expected artifact '$Name' under $Root"
              }
              if ($matches.Count -gt 1) {
                  Fail "ambiguous artifact '$Name' under $Root"
              }
              return $matches[0].FullName
          }

          function To-WslPath {
              param(
                  [string]$Distro,
                  [string]$WindowsPath
              )
              $converted = (& wsl.exe --distribution $Distro -- wslpath -a -u $WindowsPath)
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($converted)) {
                  Fail "failed to convert path '$WindowsPath' to WSL path"
              }
              return $converted.Trim()
          }

          $workspaceRoot = $env:GITHUB_WORKSPACE
          $artifactRoot = Join-Path $workspaceRoot "upstream/wsl-rehearsal"
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          $summaryPath = Join-Path $artifactRoot "wsl-install-update-rehearsal-summary.json"
          $robotOutputPath = Join-Path $artifactRoot "wsl-update-dry-run.json"
          $robotStderrPath = Join-Path $artifactRoot "wsl-update-dry-run.stderr.txt"

          $status = "pass"
          $blockedReason = $null
          $reasonCode = $null
          $updateOutcome = $null
          $version = $null
          $tag = $null
          $target = $null
          $downloadRootUri = $null
          $apiRootUri = $null
          $distro = $null
          $runUrl = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)"

          try {
              $releaseMetadataPath = Find-SingleFile -Root (Join-Path $workspaceRoot "upstream/version-metadata") -Name "release-metadata.json"
              $releaseMetadata = Get-Content -Raw -Path $releaseMetadataPath | ConvertFrom-Json
              $version = [string]$releaseMetadata.version
              $tag = [string]$releaseMetadata.tag
              if ([string]::IsNullOrWhiteSpace($version) -or [string]::IsNullOrWhiteSpace($tag)) {
                  Fail "release metadata must include non-empty version and tag"
              }

              if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") {
                  $target = "aarch64-unknown-linux-gnu"
              } else {
                  $target = "x86_64-unknown-linux-gnu"
              }

              $assetRoot = Join-Path $workspaceRoot "upstream/assets"
              $installMetadataName = "release-install-metadata-$version.json"
              $installMetadataPath = Find-SingleFile -Root $assetRoot -Name $installMetadataName
              $installMetadata = Get-Content -Raw -Path $installMetadataPath | ConvertFrom-Json

              $matchingTargets = @($installMetadata.targets | Where-Object { $_.target -eq $target })
              if ($matchingTargets.Count -eq 0) {
                  Fail "install metadata has no entry for target $target"
              }
              if ($matchingTargets.Count -gt 1) {
                  Fail "install metadata has ambiguous entries for target $target"
              }
              $targetEntry = $matchingTargets[0]
              $archiveName = [string]$targetEntry.archive_name
              if ([string]::IsNullOrWhiteSpace($archiveName)) {
                  Fail "install metadata target entry missing archive_name for $target"
              }

              $coreManifestName = [string]$installMetadata.core_manifest_name
              if ([string]::IsNullOrWhiteSpace($coreManifestName)) {
                  Fail "install metadata missing core_manifest_name"
              }

              $distro = (
                  & wsl.exe -l -q |
                  ForEach-Object { $_.Trim() } |
                  Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
                  Select-Object -First 1
              )
              if ([string]::IsNullOrWhiteSpace($distro)) {
                  Fail "no WSL distro is available on the runner"
              }

              $rehearsalRoot = Join-Path $env:RUNNER_TEMP "wsl-install-update-rehearsal"
              if (Test-Path $rehearsalRoot) {
                  Remove-Item -Path $rehearsalRoot -Recurse -Force
              }
              New-Item -ItemType Directory -Path $rehearsalRoot -Force | Out-Null

              $downloadRootFs = Join-Path $rehearsalRoot "releases/download"
              $tagRoot = Join-Path $downloadRootFs $tag
              New-Item -ItemType Directory -Path $tagRoot -Force | Out-Null

              Copy-Item -Path (Find-SingleFile -Root $assetRoot -Name $installMetadataName) -Destination (Join-Path $tagRoot $installMetadataName) -Force
              Copy-Item -Path (Find-SingleFile -Root $assetRoot -Name $coreManifestName) -Destination (Join-Path $tagRoot $coreManifestName) -Force
              Copy-Item -Path (Find-SingleFile -Root $assetRoot -Name $archiveName) -Destination (Join-Path $tagRoot $archiveName) -Force
              Copy-Item -Path (Find-SingleFile -Root (Join-Path $workspaceRoot "upstream/verify-report") -Name "SHA256SUMS") -Destination (Join-Path $tagRoot "SHA256SUMS") -Force
              Copy-Item -Path (Find-SingleFile -Root $assetRoot -Name "rr-install.sh") -Destination (Join-Path $tagRoot "rr-install.sh") -Force

              $apiRootFs = Join-Path $rehearsalRoot "api/repos/cdilga/roger-reviewer"
              $apiReleasesDir = Join-Path $apiRootFs "releases"
              New-Item -ItemType Directory -Path $apiReleasesDir -Force | Out-Null
              @"
          {
            "tag_name": "$tag"
          }
          "@ | Set-Content -Path (Join-Path $apiReleasesDir "latest") -Encoding utf8NoBOM

              $wslRehearsalRoot = To-WslPath -Distro $distro -WindowsPath $rehearsalRoot
              $downloadRootUri = "file://${wslRehearsalRoot}/releases/download"
              $apiRootUri = "file://${wslRehearsalRoot}/api/repos/cdilga/roger-reviewer"

              $wslCommandPath = Join-Path $rehearsalRoot "run-wsl-rehearsal.sh"
              @"
          #!/usr/bin/env bash
          set -euo pipefail

          version="$version"
          tag="$tag"
          target="$target"
          rehearsal_root="$wslRehearsalRoot"
          download_root_uri="$downloadRootUri"
          api_root_uri="$apiRootUri"

          install_dir="${rehearsal_root}/install/bin"
          mkdir -p "${install_dir}"

          bash "${rehearsal_root}/releases/download/${tag}/rr-install.sh" \
            --version "${version}" \
            --target "${target}" \
            --download-root "${download_root_uri}" \
            --api-root "${api_root_uri}" \
            --install-dir "${install_dir}"

          rr_path="${install_dir}/rr"
          if [[ ! -x "${rr_path}" ]]; then
            echo "installer did not produce rr at ${rr_path}" >&2
            exit 1
          fi

          RR_STORE_ROOT="${rehearsal_root}/store" "${rr_path}" update \
            --api-root "${api_root_uri}" \
            --download-root "${download_root_uri}" \
            --dry-run \
            --robot \
            1> "${rehearsal_root}/wsl-update-dry-run.json" \
            2> "${rehearsal_root}/wsl-update-dry-run.stderr.txt"
          "@ | Set-Content -Path $wslCommandPath -Encoding utf8NoBOM

              $wslCommandPathUnix = To-WslPath -Distro $distro -WindowsPath $wslCommandPath
              & wsl.exe --distribution $distro -- bash $wslCommandPathUnix
              if ($LASTEXITCODE -ne 0) {
                  Fail "WSL install/update rehearsal command failed with exit code $LASTEXITCODE"
              }

              $rawRobotPath = Join-Path $rehearsalRoot "wsl-update-dry-run.json"
              $rawRobotStderrPath = Join-Path $rehearsalRoot "wsl-update-dry-run.stderr.txt"
              if (-not (Test-Path -LiteralPath $rawRobotPath)) {
                  Fail "WSL rehearsal missing robot output at $rawRobotPath"
              }
              if (-not (Test-Path -LiteralPath $rawRobotStderrPath)) {
                  "" | Set-Content -Path $rawRobotStderrPath -Encoding utf8NoBOM
              }
              Copy-Item -Path $rawRobotPath -Destination $robotOutputPath -Force
              Copy-Item -Path $rawRobotStderrPath -Destination $robotStderrPath -Force

              $robotRaw = Get-Content -Raw -Path $robotOutputPath
              if ([string]::IsNullOrWhiteSpace($robotRaw)) {
                  Fail "WSL rehearsal rr update --dry-run --robot produced no JSON output"
              }
              $robotPayload = $robotRaw | ConvertFrom-Json
              $updateOutcome = [string]$robotPayload.outcome
              if ($robotPayload.PSObject.Properties.Name -contains "data") {
                  $data = $robotPayload.data
                  if ($null -ne $data -and $data.PSObject.Properties.Name -contains "reason_code") {
                      $reasonCode = [string]$data.reason_code
                  }
              }
              if ($updateOutcome -eq "blocked" -or $updateOutcome -eq "error") {
                  Fail "WSL rehearsal rr update dry-run outcome was $updateOutcome"
              }
              if ($reasonCode -in @("checksums_missing", "checksums_mismatch", "checksums_entry_invalid")) {
                  Fail "WSL rehearsal rr update returned checksum/asset mismatch reason_code=$reasonCode"
              }
              if ($updateOutcome -notin @("complete", "empty")) {
                  Fail "unexpected WSL rehearsal rr update outcome '$updateOutcome'"
              }
          }
          catch {
              $status = "blocked"
              $blockedReason = $_.Exception.Message
          }

          if (-not (Test-Path -LiteralPath $robotOutputPath)) {
              "{}" | Set-Content -Path $robotOutputPath -Encoding utf8NoBOM
          }
          if (-not (Test-Path -LiteralPath $robotStderrPath)) {
              "" | Set-Content -Path $robotStderrPath -Encoding utf8NoBOM
          }

          $summary = [ordered]@{
              schema = "roger.release.wsl-install-update-rehearsal.v1"
              status = $status
              run_id = $env:GITHUB_RUN_ID
              run_url = $runUrl
              release_version = $version
              release_tag = $tag
              target = $target
              wsl_distribution = $distro
              download_root = $downloadRootUri
              api_root = $apiRootUri
              update_outcome = $updateOutcome
              reason_code = $reasonCode
              blocked_reason = $blockedReason
              artifacts = @{
                  robot_output = "wsl-update-dry-run.json"
                  robot_stderr = "wsl-update-dry-run.stderr.txt"
              }
          }
          $summary | ConvertTo-Json -Depth 6 | Set-Content -Path $summaryPath -Encoding utf8NoBOM

          if ($status -ne "pass") {
              Fail "WSL install/update rehearsal blocked: $blockedReason"
          }

      - name: Upload WSL install/update rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wsl-install-update-rehearsal
          path: |
            upstream/wsl-rehearsal/wsl-install-update-rehearsal-summary.json
            upstream/wsl-rehearsal/wsl-update-dry-run.json
            upstream/wsl-rehearsal/wsl-update-dry-run.stderr.txt
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: github.event_name == 'workflow_dispatch'
    needs:
      - derive-release-metadata
      - verify-release-assets
      - windows-install-update-rehearsal
      - wsl-install-update-rehearsal
    runs-on: ubuntu-latest
    environment: release-publish-approval
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: upstream/version-metadata

      - uses: actions/download-artifact@v4
        with:
          name: release-build-core-manifest
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          name: core-install-metadata
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: upstream/assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: bridge-bundle-*
          path: upstream/assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: extension-bundle
          path: upstream/assets

      - uses: actions/download-artifact@v4
        with:
          name: release-verify-assets-report
          path: upstream/verify-report

      - id: plan
        name: Build release publication plan
        shell: bash
        run: |
          set -euo pipefail
          version_metadata="$(find upstream/version-metadata -type f -name 'release-metadata.json' | head -n1)"
          verified_manifest="$(find upstream/verify-report -type f -name 'release-asset-manifest.json' | head -n1)"
          current_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          installer_sh="$(find upstream/assets -type f -name 'rr-install.sh' | head -n1)"
          installer_ps1="$(find upstream/assets -type f -name 'rr-install.ps1' | head -n1)"

          if [[ -z "${installer_sh}" || -z "${installer_ps1}" ]]; then
            echo "missing installer artifacts under upstream/assets"
            find upstream/assets -maxdepth 4 -type f | sort
            exit 1
          fi

          cp "${installer_sh}" upstream/assets/rr-install.sh
          cp "${installer_ps1}" upstream/assets/rr-install.ps1

          smoke_ack_flag=()
          if [[ "${{ inputs.operator_smoke_ack }}" == 'true' ]]; then
            smoke_ack_flag+=(--operator-smoke-ack)
          fi

          python3 scripts/release/publish_release.py \
            --version-metadata "${version_metadata}" \
            --verified-manifest "${verified_manifest}" \
            --upstream-verified-manifest "${verified_manifest}" \
            --core-run-url "${current_run_url}" \
            --verify-run-url "${current_run_url}" \
            --bridge-run-url "${current_run_url}" \
            --extension-run-url "${current_run_url}" \
            --asset-root upstream/assets \
            --checksums upstream/verify-report/SHA256SUMS \
            --signing-notes upstream/verify-report/release-notes-signing.md \
            --publish-mode "${{ inputs.publish_mode }}" \
            "${smoke_ack_flag[@]}" \
            --output-dir publish-plan

          echo "tag=$(jq -r '.release.tag' publish-plan/release-plan.json)" >>"${GITHUB_OUTPUT}"

      - name: Publish GitHub release from verified plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          plan_path="publish-plan/release-plan.json"
          notes_path="$(jq -r '.notes_path' "${plan_path}")"
          tag="$(jq -r '.release.tag' "${plan_path}")"
          title="$(jq -r '.release.name' "${plan_path}")"
          draft="$(jq -r '.release.draft' "${plan_path}")"
          prerelease="$(jq -r '.release.prerelease' "${plan_path}")"

          mapfile -t assets < <(jq -r '.assets[]' "${plan_path}")

          gh_args=(--verify-tag --title "${title}" --notes-file "${notes_path}")
          if [[ "${draft}" == 'true' ]]; then
            gh_args+=(--draft)
          fi
          if [[ "${prerelease}" == 'true' ]]; then
            gh_args+=(--prerelease)
          fi

          gh release create "${tag}" "${assets[@]}" "${gh_args[@]}"

      - name: Upload publish-plan evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-publish-plan
          path: |
            publish-plan/release-plan.json
            publish-plan/release-notes.md
            upstream/verify-report/release-asset-manifest.json
            upstream/verify-report/SHA256SUMS
            upstream/verify-report/release-notes-signing.md
          if-no-files-found: error
          retention-days: 14
