name: release-publish

on:
  workflow_dispatch:
    inputs:
      core_run_id:
        description: "Run ID for release-build-core workflow artifacts"
        required: true
        type: string
      verify_run_id:
        description: "Run ID for release-verify-assets workflow artifacts"
        required: true
        type: string
      bridge_run_id:
        description: "Optional run ID for release-package-bridge artifacts"
        required: false
        type: string
      extension_run_id:
        description: "Optional run ID for release-package-extension artifacts"
        required: false
        type: string
      publish_mode:
        description: "Explicit release behavior"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - publish
      operator_smoke_ack:
        description: "Set true after manual release-smoke completion (required for publish mode)"
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - .github/workflows/release-publish.yml
      - scripts/release/publish_release.py
      - scripts/release/test_release_publish_workflow.sh
      - scripts/release/test_publish_release.sh
      - scripts/release/validate_upstream_run.sh
      - scripts/release/test_validate_upstream_run.sh
      - scripts/release/verify_release_assets.py

permissions:
  contents: write
  actions: read

jobs:
  fixture-rehearsal:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rehearse upstream-run gate + publish policy fixtures
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/release/test_release_publish_workflow.sh
          bash scripts/release/test_validate_upstream_run.sh
          bash scripts/release/test_publish_release.sh

  publish-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release-publish-approval
    steps:
      - uses: actions/checkout@v4

      - name: Verify GitHub CLI availability
        run: gh --version

      - id: validate_upstream_runs
        name: Validate upstream run identities and successful completion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          validate_run() {
            local run_id="$1"
            local expected_path="$2"
            local label="$3"

            if [[ -z "${run_id}" ]]; then
              echo "error: missing required run id for ${label}" >&2
              exit 1
            fi

            local payload_path
            payload_path="run-${label}.json"
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >"${payload_path}"

            bash scripts/release/validate_upstream_run.sh \
              --payload "${payload_path}" \
              --expected-workflow-path "${expected_path}" \
              --label "${label}"
          }

          core_run_url="$(validate_run "${{ inputs.core_run_id }}" ".github/workflows/release-build-core.yml" "core")"
          verify_run_url="$(validate_run "${{ inputs.verify_run_id }}" ".github/workflows/release-verify-assets.yml" "verify")"

          bridge_run_url=""
          if [[ -n "${{ inputs.bridge_run_id }}" ]]; then
            bridge_run_url="$(validate_run "${{ inputs.bridge_run_id }}" ".github/workflows/release-package-bridge.yml" "bridge")"
          fi

          extension_run_url=""
          if [[ -n "${{ inputs.extension_run_id }}" ]]; then
            extension_run_url="$(validate_run "${{ inputs.extension_run_id }}" ".github/workflows/release-package-extension.yml" "extension")"
          fi

          {
            echo "core_run_url=${core_run_url}"
            echo "verify_run_url=${verify_run_url}"
            echo "bridge_run_url=${bridge_run_url}"
            echo "extension_run_url=${extension_run_url}"
          } >>"${GITHUB_OUTPUT}"

      - name: Download required upstream artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upstream/version-metadata upstream/assets upstream/verify-report upstream/optional-summaries upstream/reverified publish-plan

          gh run download "${{ inputs.core_run_id }}" \
            --name release-version-metadata \
            --dir upstream/version-metadata

          gh run download "${{ inputs.core_run_id }}" \
            --name release-build-core-manifest \
            --dir upstream/assets

          gh run download "${{ inputs.core_run_id }}" \
            --name core-install-metadata \
            --dir upstream/assets

          gh run download "${{ inputs.core_run_id }}" \
            --pattern 'core-*' \
            --dir upstream/assets

          gh run download "${{ inputs.verify_run_id }}" \
            --name release-verify-assets-report \
            --dir upstream/verify-report

          if [[ -n "${{ inputs.bridge_run_id }}" ]]; then
            gh run download "${{ inputs.bridge_run_id }}" \
              --pattern 'bridge-bundle-*' \
              --dir upstream/assets

            gh run download "${{ inputs.bridge_run_id }}" \
              --name release-optional-lanes-bridge \
              --dir upstream/optional-summaries
          fi

          if [[ -n "${{ inputs.extension_run_id }}" ]]; then
            gh run download "${{ inputs.extension_run_id }}" \
              --name extension-bundle \
              --dir upstream/assets

            gh run download "${{ inputs.extension_run_id }}" \
              --name release-optional-lanes-extension \
              --dir upstream/optional-summaries
          fi

      - name: Re-verify downloaded upstream assets
        shell: bash
        run: |
          set -euo pipefail

          version_metadata="$(find upstream/version-metadata -type f -name 'release-metadata.json' | head -n1)"
          core_manifest="$(find upstream/assets -type f -name 'release-core-manifest-*.json' | head -n1)"

          if [[ -z "${version_metadata}" || -z "${core_manifest}" ]]; then
            echo "error: missing version metadata or core manifest from upstream runs" >&2
            exit 1
          fi

          optional_args=()
          while IFS= read -r summary; do
            optional_args+=(--optional-summary "$summary")
          done < <(find upstream/optional-summaries -type f -name '*.json' | sort)

          python3 scripts/release/verify_release_assets.py \
            --version-metadata "${version_metadata}" \
            --core-manifest "${core_manifest}" \
            --asset-root upstream/assets \
            "${optional_args[@]}" \
            --output-dir upstream/reverified

      - name: Build release publication plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          echo "core run: ${{ steps.validate_upstream_runs.outputs.core_run_url }}"
          echo "verify run: ${{ steps.validate_upstream_runs.outputs.verify_run_url }}"
          if [[ -n "${{ steps.validate_upstream_runs.outputs.bridge_run_url }}" ]]; then
            echo "bridge run: ${{ steps.validate_upstream_runs.outputs.bridge_run_url }}"
          fi
          if [[ -n "${{ steps.validate_upstream_runs.outputs.extension_run_url }}" ]]; then
            echo "extension run: ${{ steps.validate_upstream_runs.outputs.extension_run_url }}"
          fi

          version_metadata="$(find upstream/version-metadata -type f -name 'release-metadata.json' | head -n1)"
          upstream_manifest="$(find upstream/verify-report -type f -name 'release-asset-manifest.json' | head -n1)"

          if [[ -z "${upstream_manifest}" ]]; then
            echo "error: missing upstream release-verify-assets manifest" >&2
            exit 1
          fi

          smoke_ack_flag=()
          if [[ "${{ inputs.operator_smoke_ack }}" == 'true' ]]; then
            smoke_ack_flag+=(--operator-smoke-ack)
          fi

          python3 scripts/release/publish_release.py \
            --version-metadata "${version_metadata}" \
            --verified-manifest upstream/reverified/release-asset-manifest.json \
            --upstream-verified-manifest "${upstream_manifest}" \
            --core-run-url "${{ steps.validate_upstream_runs.outputs.core_run_url }}" \
            --verify-run-url "${{ steps.validate_upstream_runs.outputs.verify_run_url }}" \
            --bridge-run-url "${{ steps.validate_upstream_runs.outputs.bridge_run_url }}" \
            --extension-run-url "${{ steps.validate_upstream_runs.outputs.extension_run_url }}" \
            --asset-root upstream/assets \
            --checksums upstream/reverified/SHA256SUMS \
            --signing-notes upstream/reverified/release-notes-signing.md \
            --publish-mode "${{ inputs.publish_mode }}" \
            "${smoke_ack_flag[@]}" \
            --output-dir publish-plan

          echo "tag=$(jq -r '.release.tag' publish-plan/release-plan.json)" >>"${GITHUB_OUTPUT}"
          echo "release_name=$(jq -r '.release.name' publish-plan/release-plan.json)" >>"${GITHUB_OUTPUT}"
          echo "draft=$(jq -r '.release.draft' publish-plan/release-plan.json)" >>"${GITHUB_OUTPUT}"
          echo "prerelease=$(jq -r '.release.prerelease' publish-plan/release-plan.json)" >>"${GITHUB_OUTPUT}"

      - name: Publish GitHub release from verified plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          plan_path="publish-plan/release-plan.json"
          notes_path="$(jq -r '.notes_path' "${plan_path}")"
          tag="$(jq -r '.release.tag' "${plan_path}")"
          title="$(jq -r '.release.name' "${plan_path}")"
          draft="$(jq -r '.release.draft' "${plan_path}")"
          prerelease="$(jq -r '.release.prerelease' "${plan_path}")"

          mapfile -t assets < <(jq -r '.assets[]' "${plan_path}")
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "error: publish plan contains no assets" >&2
            exit 1
          fi

          for asset in "${assets[@]}"; do
            if [[ ! -f "${asset}" ]]; then
              echo "error: planned asset is missing: ${asset}" >&2
              exit 1
            fi
          done

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "error: release tag already exists, refusing to mutate existing release: ${tag}" >&2
            exit 1
          fi

          gh_args=(--verify-tag --title "${title}" --notes-file "${notes_path}")
          if [[ "${draft}" == 'true' ]]; then
            gh_args+=(--draft)
          fi
          if [[ "${prerelease}" == 'true' ]]; then
            gh_args+=(--prerelease)
          fi

          gh release create "${tag}" "${assets[@]}" "${gh_args[@]}"

      - name: Upload publish-plan evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-publish-plan
          path: |
            publish-plan/release-plan.json
            publish-plan/release-notes.md
            run-*.json
            upstream/reverified/release-asset-manifest.json
            upstream/reverified/SHA256SUMS
            upstream/reverified/release-notes-signing.md
          if-no-files-found: error
          retention-days: 14
