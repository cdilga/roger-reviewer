name: release-build-core

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref for CalVer derivation (defaults to GITHUB_REF)"
        required: false
        type: string
      sha:
        description: "Commit SHA for derivation (defaults to GITHUB_SHA)"
        required: false
        type: string
      today:
        description: "UTC date basis for nightly derivation (YYYY.MM.DD)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  derive-release-metadata:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.derive.outputs.channel }}
      version: ${{ steps.derive.outputs.version }}
      tag: ${{ steps.derive.outputs.tag }}
      prerelease: ${{ steps.derive.outputs.prerelease }}
      artifact_stem: ${{ steps.derive.outputs.artifact_stem }}
      release_name: ${{ steps.derive.outputs.release_name }}
      workspace_version: ${{ steps.derive.outputs.workspace_version }}
    steps:
      - uses: actions/checkout@v4

      - id: derive
        env:
          INPUT_REF: ${{ github.event.inputs.ref || '' }}
          INPUT_SHA: ${{ github.event.inputs.sha || '' }}
          INPUT_TODAY: ${{ github.event.inputs.today || '' }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${GITHUB_REF}}"
          sha="${INPUT_SHA:-${GITHUB_SHA}}"
          today="${INPUT_TODAY:-$(date -u +%Y.%m.%d)}"

          python3 scripts/release/derive_calver_version.py \
            --ref "${ref}" \
            --sha "${sha}" \
            --today "${today}" > release-metadata.json

          echo "channel=$(jq -r '.channel' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "version=$(jq -r '.version' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "tag=$(jq -r '.tag' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "prerelease=$(jq -r '.prerelease' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "artifact_stem=$(jq -r '.artifact_stem' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "release_name=$(jq -r '.release_name' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "workspace_version=$(jq -r '.workspace_version' release-metadata.json)" >>"${GITHUB_OUTPUT}"

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata.json
          if-no-files-found: error
          retention-days: 14

  build-core:
    needs: derive-release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: rr
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: rr
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: rr
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            binary_name: rr.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build rr for target
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p roger-cli --bin rr --release --target "${{ matrix.target }}"

      - name: Package target archive + per-target manifest
        shell: bash
        env:
          ARTIFACT_STEM: ${{ needs.derive-release-metadata.outputs.artifact_stem }}
          RELEASE_CHANNEL: ${{ needs.derive-release-metadata.outputs.channel }}
          RELEASE_VERSION: ${{ needs.derive-release-metadata.outputs.version }}
          RELEASE_TAG: ${{ needs.derive-release-metadata.outputs.tag }}
          RELEASE_PRERELEASE: ${{ needs.derive-release-metadata.outputs.prerelease }}
          RELEASE_NAME: ${{ needs.derive-release-metadata.outputs.release_name }}
          WORKSPACE_VERSION: ${{ needs.derive-release-metadata.outputs.workspace_version }}
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          binary_name="${{ matrix.binary_name }}"

          archive_name="${ARTIFACT_STEM}-core-${target}.tar.gz"
          payload_dir="${ARTIFACT_STEM}-core-${target}"
          mkdir -p "dist/${payload_dir}"

          cp "target/${target}/release/${binary_name}" "dist/${payload_dir}/${binary_name}"

          cat >"dist/${payload_dir}/runtime-metadata.json" <<EOF
          {
            "schema": "roger.release-core-runtime.v1",
            "channel": "${RELEASE_CHANNEL}",
            "version": "${RELEASE_VERSION}",
            "tag": "${RELEASE_TAG}",
            "release_name": "${RELEASE_NAME}",
            "prerelease": ${RELEASE_PRERELEASE},
            "workspace_version": "${WORKSPACE_VERSION}",
            "target": "${target}",
            "binary_name": "${binary_name}",
            "source_ref": "${GITHUB_REF}",
            "source_sha": "${GITHUB_SHA}"
          }
          EOF

          tar -czf "dist/${archive_name}" -C dist "${payload_dir}"
          archive_sha256="$(python3 -c "import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('dist/${archive_name}').read_bytes()).hexdigest())")"

          cat >"dist/core-manifest-${target}.json" <<EOF
          {
            "schema": "roger.release-build-core.target.v1",
            "target": "${target}",
            "runner_os": "${{ runner.os }}",
            "archive_name": "${archive_name}",
            "archive_path": "dist/${archive_name}",
            "archive_sha256": "${archive_sha256}",
            "payload_dir": "${payload_dir}",
            "binary_name": "${binary_name}"
          }
          EOF

      - name: Upload target archive and manifest
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.target }}
          path: |
            dist/${{ needs.derive-release-metadata.outputs.artifact_stem }}-core-${{ matrix.target }}.tar.gz
            dist/core-manifest-${{ matrix.target }}.json
          if-no-files-found: error
          retention-days: 14

  aggregate-core-manifest:
    needs:
      - derive-release-metadata
      - build-core
    runs-on: ubuntu-latest
    outputs:
      release_channel: ${{ needs.derive-release-metadata.outputs.channel }}
      release_version: ${{ needs.derive-release-metadata.outputs.version }}
      release_tag: ${{ needs.derive-release-metadata.outputs.tag }}
      release_prerelease: ${{ needs.derive-release-metadata.outputs.prerelease }}
      manifest_name: ${{ steps.aggregate.outputs.manifest_name }}
      manifest_path: ${{ steps.aggregate.outputs.manifest_path }}
      built_target_count: ${{ steps.aggregate.outputs.built_target_count }}
      matrix_scope: ${{ steps.aggregate.outputs.matrix_scope }}
      excluded_targets: ${{ steps.aggregate.outputs.excluded_targets }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata

      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: core-builds
          merge-multiple: true

      - id: aggregate
        run: |
          set -euo pipefail
          matrix_scope="first_shipped_subset"
          excluded_target="aarch64-pc-windows-msvc"
          manifest_name="release-core-manifest-${{ needs.derive-release-metadata.outputs.version }}.json"
          manifest_path="core-builds/${manifest_name}"

          python3 scripts/release/build_core_manifest.py \
            --version-metadata release-metadata/release-metadata.json \
            --core-manifests-dir core-builds \
            --matrix-scope "${matrix_scope}" \
            --excluded-target "${excluded_target}" \
            --output "${manifest_path}"

          echo "manifest_name=${manifest_name}" >>"${GITHUB_OUTPUT}"
          echo "manifest_path=${manifest_path}" >>"${GITHUB_OUTPUT}"
          echo "built_target_count=$(jq -r '.built_target_count' "${manifest_path}")" >>"${GITHUB_OUTPUT}"
          echo "matrix_scope=${matrix_scope}" >>"${GITHUB_OUTPUT}"
          echo "excluded_targets=${excluded_target}" >>"${GITHUB_OUTPUT}"

      - name: Upload release-build-core aggregate manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-build-core-manifest
          path: ${{ steps.aggregate.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 14
