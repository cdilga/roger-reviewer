name: release-package-bridge

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref for CalVer derivation (defaults to GITHUB_REF)"
        required: false
        type: string
      sha:
        description: "Commit SHA for derivation (defaults to GITHUB_SHA)"
        required: false
        type: string
      today:
        description: "UTC date basis for nightly derivation (YYYY.MM.DD)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  derive-release-metadata:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.derive.outputs.channel }}
      version: ${{ steps.derive.outputs.version }}
      tag: ${{ steps.derive.outputs.tag }}
      prerelease: ${{ steps.derive.outputs.prerelease }}
      artifact_stem: ${{ steps.derive.outputs.artifact_stem }}
    steps:
      - uses: actions/checkout@v4

      - id: derive
        env:
          INPUT_REF: ${{ github.event.inputs.ref || '' }}
          INPUT_SHA: ${{ github.event.inputs.sha || '' }}
          INPUT_TODAY: ${{ github.event.inputs.today || '' }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${GITHUB_REF}}"
          sha="${INPUT_SHA:-${GITHUB_SHA}}"
          today="${INPUT_TODAY:-$(date -u +%Y.%m.%d)}"

          python3 scripts/release/derive_calver_version.py \
            --ref "${ref}" \
            --sha "${sha}" \
            --today "${today}" > release-metadata.json

          echo "channel=$(jq -r '.channel' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "version=$(jq -r '.version' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "tag=$(jq -r '.tag' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "prerelease=$(jq -r '.prerelease' release-metadata.json)" >>"${GITHUB_OUTPUT}"
          echo "artifact_stem=$(jq -r '.artifact_stem' release-metadata.json)" >>"${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata.json
          if-no-files-found: error
          retention-days: 14

  package-bridge:
    needs: derive-release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            bundle_os: linux
          - runner: macos-14
            bundle_os: macos
          - runner: windows-2022
            bundle_os: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata

      - name: Build bridge registration bundle for ${{ matrix.bundle_os }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/release/package_bridge_bundle.sh \
            --version-metadata release-metadata/release-metadata.json \
            --os "${{ matrix.bundle_os }}" \
            --output-dir dist/bridge

      - name: Upload bridge bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-bundle-${{ matrix.bundle_os }}
          path: |
            dist/bridge/*-bridge-${{ matrix.bundle_os }}.tar.gz
            dist/bridge/*-bridge-${{ matrix.bundle_os }}/bridge-bundle-manifest.json
            dist/bridge/*-bridge-${{ matrix.bundle_os }}/asset-manifest.json
            dist/bridge/*-bridge-${{ matrix.bundle_os }}/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  summarize-optional-lanes:
    needs:
      - derive-release-metadata
      - package-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-version-metadata
          path: release-metadata

      - uses: actions/download-artifact@v4
        with:
          pattern: bridge-bundle-*
          path: optional-lanes/bridge
          merge-multiple: true

      - name: Build optional-lane summary (bridge built, extension skipped)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t bridge_archives < <(find optional-lanes/bridge -type f -name '*.tar.gz' | sort)
          if [[ ${#bridge_archives[@]} -eq 0 ]]; then
            echo "error: expected bridge bundle archives were not found" >&2
            exit 1
          fi

          args=()
          for archive in "${bridge_archives[@]}"; do
            args+=(--bridge-artifact "$(basename "$archive")")
          done

          python3 scripts/release/build_optional_lane_summary.py \
            --version-metadata release-metadata/release-metadata.json \
            --bridge-status built \
            --extension-status skipped \
            --extension-note "release-package-extension lane was not run in release-package-bridge workflow" \
            "${args[@]}" \
            --output optional-lanes/release-optional-lanes-bridge.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-optional-lanes-bridge
          path: optional-lanes/release-optional-lanes-bridge.json
          if-no-files-found: error
          retention-days: 14
