name: validation-pr

on:
  pull_request:

jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: tier
        uses: ./.github/actions/validation-tier
        with:
          tier: pr

      - name: Upload failure artifacts
        if: ${{ always() && failure() && steps.tier.outputs.upload_mode == 'failure' && steps.tier.outputs.bootstrap_skip != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-pr-failures
          path: ${{ steps.tier.outputs.artifact_root }}
          if-no-files-found: ignore
          retention-days: ${{ steps.tier.outputs.retention_days }}
