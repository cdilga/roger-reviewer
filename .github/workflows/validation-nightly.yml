name: validation-nightly

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

concurrency:
  group: validation-nightly-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: tier
        uses: ./.github/actions/validation-tier
        with:
          tier: nightly

      - name: Upload nightly artifacts
        if: ${{ always() && steps.tier.outputs.upload_mode == 'always' && steps.tier.outputs.bootstrap_skip != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-nightly-artifacts
          path: ${{ steps.tier.outputs.artifact_root }}
          if-no-files-found: ignore
          retention-days: ${{ steps.tier.outputs.retention_days }}
