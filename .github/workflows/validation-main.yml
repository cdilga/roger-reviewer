name: validation-main

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Validation tier to run manually"
        required: true
        default: release
        type: choice
        options:
          - gated
          - nightly
          - release

concurrency:
  group: validation-main-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  main:
    runs-on: ubuntu-latest
    outputs:
      selected_tier: ${{ steps.select.outputs.tier }}
    steps:
      - id: select
        shell: bash
        run: |
          set -euo pipefail
          tier="${{ github.event.inputs.tier }}"
          echo "tier=${tier}" >>"${GITHUB_OUTPUT}"

      - uses: actions/checkout@v4

      - id: tier
        uses: ./.github/actions/validation-tier
        with:
          tier: ${{ steps.select.outputs.tier }}

      - name: Upload validation artifacts
        if: ${{ always() && steps.tier.outputs.bootstrap_skip != 'true' && (steps.tier.outputs.upload_mode == 'always' || failure()) }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-${{ steps.select.outputs.tier }}-artifacts
          path: ${{ steps.tier.outputs.artifact_root }}
          if-no-files-found: ignore
          retention-days: ${{ steps.tier.outputs.retention_days }}
