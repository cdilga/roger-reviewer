name: release-calver-dry-run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/validation/**"
      - ".github/workflows/release-calver-dry-run.yml"
      - "docs/CALVER_RELEASE_VERSIONING_CONTRACT.md"

jobs:
  derive:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: stable
            git_ref: refs/tags/v2026.03.31
            date_utc: "2026-03-31"
            run_number: "701"
            expected_channel: stable
            expected_tag: v2026.03.31
          - case: rc
            git_ref: refs/tags/v2026.03.31-rc.2
            date_utc: "2026-03-31"
            run_number: "702"
            expected_channel: rc
            expected_tag: v2026.03.31-rc.2
          - case: nightly
            git_ref: refs/heads/main
            date_utc: "2026-03-31"
            run_number: "703"
            expected_channel: nightly
            expected_tag: v2026.03.31-nightly.703

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Derive CalVer (${{ matrix.case }})
        env:
          GITHUB_REF: ${{ matrix.git_ref }}
          GITHUB_SHA: 0123456789abcdef0123456789abcdef01234567
          GITHUB_RUN_NUMBER: ${{ matrix.run_number }}
          GITHUB_RUN_ATTEMPT: "1"
          RR_CALVER_DATE_UTC: ${{ matrix.date_utc }}
        run: |
          output="$(cargo run -q -p roger-validation --bin rr-validation -- derive-calver)"
          printf '%s\n' "$output"
          printf '%s\n' "$output" | grep -Fx "channel=${{ matrix.expected_channel }}"
          printf '%s\n' "$output" | grep -Fx "tag=${{ matrix.expected_tag }}"
          printf '%s\n' "$output" | grep -Fx "source_ref=${{ matrix.git_ref }}"
